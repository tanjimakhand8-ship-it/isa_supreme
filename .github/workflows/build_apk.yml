name: 🚀 Build ISA SUPREME APK (Supercharged)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ক্যাশ করলে Flutter ডিপেন্ডেন্সি অনেক দ্রুত ইন্সটল হবে (১৫ গুণ গতি)
      - name: ⚡ Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            pubspec.lock
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 🔧 Create Android Project
        run: flutter create --platforms android .

      - name: 🔨 Build APK with Secrets & Verbose Logging
        run: flutter build apk --debug --verbose \
               --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }} \
               --dart-define=MASTER_PASSWORD=${{ secrets.MASTER_PASSWORD }}

      # অটোমেটিক রিলিজ তৈরি করে APK আপলোড (সর্বজনীন লিংক দেবে)
      - name: 📦 Create GitHub Release & Upload APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ISA SUPREME APK Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # টেলিগ্রামে সফল/ব্যর্থতার নোটিফিকেশন (অপশনাল – পরে চালু করবি)
      - name: 🔔 Notify Telegram on Success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ ISA SUPREME APK Build #${{ github.run_number }} succeeded!
            📲 Download: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v1.0.${{ github.run_number }}

      - name: 🔔 Notify Telegram on Failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ ISA SUPREME APK Build #${{ github.run_number }} FAILED!
            🔍 Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # আর্টিফ্যাক্ট আপলোড (রানের ভেতরেই ডাউনলোড লিংক পাবে)
      - name: 📤 Upload APK as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isa-supreme-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
