name: 🔥 Build ISA APK + Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # <-- এই লাইনটাই রিলিজ তৈরির অনুমতি দেবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
      - name: Create Android project
        run: flutter create --platforms android .
      - name: Build APK
        run: flutter build apk --debug --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }} --dart-define=MASTER_PASSWORD=${{ secrets.MASTER_PASSWORD }}
      - name: 📤 Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ISA SUPREME Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
